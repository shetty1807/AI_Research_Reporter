name: AI Research Reporter CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t ai-research-reporter .

      - name: Success Message
        run: echo "Build completed successfully"
