services:
  app:
    build: .
    container_name: ai-devops-app
    ports:
      - "8501:8501"

  nginx:
    image: nginx:latest
    container_name: ai-devops-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  prometheus:
    image: prom/prometheus
    container_name: ai-devops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

 